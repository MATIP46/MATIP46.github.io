<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI OS Desktop</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

/* BOOT */
#boot {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

/* DESKTOP */
#desktop {
    display:none;
    height:100vh;
    background-size:cover;
    background-position:center;
    padding:20px;
    position:relative;
}

/* ICONS */
.icon {
    width:90px;
    text-align:center;
    display:inline-block;
    margin:10px;
    cursor:pointer;
    position:relative;
    z-index:2;
}

.icon img {
    width:48px;
    height:48px;
}

/* TASKBAR */
#taskbar {
    position:fixed;
    bottom:0;
    width:100%;
    height:40px;
    background:#222;
    display:flex;
    align-items:center;
    padding:5px;
}

/* WINDOW */
.window {
    position:absolute;
    width:300px;
    height:220px;
    background:#333;
    border:1px solid #555;
    padding:5px;
    overflow:auto;
}
</style>

</head>
<body>

<div id="boot">
    <h2>AI OS Booting...</h2>
    <p id="bootText">Starting kernel...</p>
</div>

<div id="desktop">

    <div class="icon" onclick="openApp('terminal')">
        <img src="assets/icons/terminal.png">
        <div>Terminal</div>
    </div>

    <div class="icon" onclick="openApp('notes')">
        <img src="assets/icons/notes.png">
        <div>Notes</div>
    </div>

    <div class="icon" onclick="openApp('files')">
        <img src="assets/icons/files.png">
        <div>Files</div>
    </div>

    <div class="icon" onclick="openApp('goals')">
        <img src="assets/icons/goals.png">
        <div>Goals</div>
    </div>

    <div class="icon" onclick="openApp('settings-wallpaper')">
        <img src="assets/icons/settings.png">
        <div>Wallpaper</div>
    </div>

</div>

<div id="taskbar">
    <span id="status">Booting...</span>
</div>

<script type="module">

import * as webllm from "https://esm.run/@mlc-ai/web-llm";

let engine;

/////////////////////////////////////////////////////
// 💾 FILE SYSTEM
/////////////////////////////////////////////////////

let FS = JSON.parse(localStorage.getItem("FS") || "{}");

function writeFile(path, data){
    FS[path] = data;
    localStorage.setItem("FS", JSON.stringify(FS));
}

function readFile(path){
    return FS[path] || "";
}

function listFiles(){
    return Object.keys(FS);
}

/////////////////////////////////////////////////////
// 🧠 KERNEL
/////////////////////////////////////////////////////

let KERNEL = {
    goals: [],
    memory: {},
    tick: 0
};

function addGoal(text){
    KERNEL.goals.push({text, status:"pending"});
}

function nextGoal(){
    return KERNEL.goals.find(g => g.status === "pending");
}

/////////////////////////////////////////////////////
// 🧠 MEMORY
/////////////////////////////////////////////////////

function learn(text){
    let words = text.toLowerCase().split(/\W+/).filter(Boolean);
    for(let w of words){
        KERNEL.memory[w] = (KERNEL.memory[w] || 0) + 1;
    }
}

function memorySummary(){
    return Object.entries(KERNEL.memory)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,6)
        .map(x=>x[0])
        .join(", ");
}

/////////////////////////////////////////////////////
// 🖼️ WALLPAPER SYSTEM
/////////////////////////////////////////////////////

let WALLPAPERS = [
    "default.jpg"
];

function setWallpaper(name){
    document.getElementById("desktop").style.backgroundImage =
        `url('assets/wallpapers/${name}')`;
    localStorage.setItem("wallpaper", name);
}

function loadWallpaper(){
    let saved = localStorage.getItem("wallpaper") || "default.jpg";
    setWallpaper(saved);
}

/////////////////////////////////////////////////////
// 🤖 AI
/////////////////////////////////////////////////////

async function AI(input){

    let prompt = `
You are an AI OS.

Memory:
${memorySummary()}

Files:
${listFiles().join(", ")}

User:
${input}
`;

    let res = await engine.chat.completions.create({
        messages:[{role:"user", content:prompt}]
    });

    return res.choices[0].message.content;
}

/////////////////////////////////////////////////////
// 🤖 AI WALLPAPER SUGGEST
/////////////////////////////////////////////////////

async function AI_SUGGEST_WALLPAPER(){

    let res = await engine.chat.completions.create({
        messages:[{
            role:"user",
            content:`
Pick best wallpaper from:
${WALLPAPERS.join(", ")}

Memory:
${memorySummary()}

Reply ONLY filename.
`
        }]
    });

    let txt = res.choices[0].message.content.trim();

    if(!WALLPAPERS.includes(txt)){
        return WALLPAPERS[Math.floor(Math.random()*WALLPAPERS.length)];
    }

    return txt;
}

/////////////////////////////////////////////////////
// 🖥️ WINDOW
/////////////////////////////////////////////////////

function createWindow(title, content){
    let w = document.createElement("div");
    w.className = "window";
    w.style.left = (50 + Math.random()*100) + "px";
    w.style.top = (50 + Math.random()*100) + "px";

    w.innerHTML = `
        <b>${title}</b><br>
        ${content}
        <button onclick="this.parentElement.remove()">close</button>
    `;

    document.body.appendChild(w);
}

/////////////////////////////////////////////////////
// 🧩 APPS
/////////////////////////////////////////////////////

window.openApp = function(app){

    if(app==="notes"){
        createWindow("Notes",
        `<textarea id="t" style="width:100%;height:120px;">${readFile("notes.txt")}</textarea>
         <button onclick="save()">Save</button>`);

        window.save = ()=>writeFile("notes.txt",document.getElementById("t").value);
    }

    if(app==="files"){
        createWindow("Files", listFiles().join("<br>"));
    }

    if(app==="goals"){
        createWindow("Goals", KERNEL.goals.map(g=>g.text).join("<br>"));
    }

    if(app==="terminal"){
        let cmd = prompt("AI Command:");
        AI(cmd).then(r=>createWindow("AI", r));
    }

    if(app==="settings-wallpaper"){

        let list = WALLPAPERS.map(w=>`
            <img src="assets/wallpapers/${w}" 
                 style="width:80px;height:50px;cursor:pointer;"
                 onclick="preview('${w}')">
        `).join("");

        createWindow("Wallpaper",
        `${list}
        <hr>
        <img id="previewImg" style="width:100%;height:80px;">
        <button onclick="apply()">Apply</button>
        <button onclick="suggest()">AI Suggest</button>`);

        window.preview = (w)=>{
            document.getElementById("previewImg").src =
                "assets/wallpapers/"+w;
            window._w = w;
        };

        window.apply = ()=>{
            if(window._w) setWallpaper(window._w);
        };

        window.suggest = async ()=>{
            let s = await AI_SUGGEST_WALLPAPER();
            preview(s);
        };
    }
};

/////////////////////////////////////////////////////
// 🔁 KERNEL LOOP
/////////////////////////////////////////////////////

function kernelTick(){

    KERNEL.tick++;

    if(KERNEL.tick % 6 === 0){
        addGoal("Improve memory");
        addGoal("Review files");
    }

    let g = nextGoal();

    if(g){
        AI(g.text).then(r=>{
            learn(r);
            g.status="done";
        });
    }
}

/////////////////////////////////////////////////////
// 🚀 START
/////////////////////////////////////////////////////

async function startOS(){

    document.getElementById("boot").style.display="none";
    document.getElementById("desktop").style.display="block";

    loadWallpaper();

    const model = "Llama-3.1-1B-Instruct-q4f32_1-MLC";

    engine = await webllm.CreateMLCEngine(model,{
        initProgressCallback:(p)=>{
            document.getElementById("status").innerText =
                "AI loading "+Math.round(p.progress*100)+"%";
        }
    });

    document.getElementById("status").innerText="AI OS Online ✔";

    setInterval(kernelTick,2000);
}

/////////////////////////////////////////////////////
// BOOT
/////////////////////////////////////////////////////

let steps=[
    "Initializing kernel...",
    "Mounting filesystem...",
    "Loading AI...",
    "Starting OS..."
];

let i=0;

function bootNext(){
    if(i<steps.length){
        document.getElementById("bootText").innerText=steps[i];
        i++;
        setTimeout(bootNext,800);
    } else startOS();
}

bootNext();

</script>

</body>
</html>
